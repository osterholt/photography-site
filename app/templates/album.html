{% extends "base.html" %}
{% block title %}{{ album_name }}{% endblock %}

{% block content %}
<div class="page-intro">
    <a href="/" class="back-link">← All Albums</a>
    <h1 class="page-title">{{ album_name }}</h1>
    <p class="page-meta">{{ count }} photo{% if count != 1 %}s{% endif %}</p>
</div>

<div class="photo-grid">
    {% for photo in photos %}
    <div class="photo-item" onclick="openLightbox({{ loop.index0 }})">
        <img
            src="/thumbnails/{{ slug }}/{{ photo }}"
            alt="Photo {{ loop.index }}"
            loading="lazy"
        >
    </div>
    {% endfor %}
</div>

<!-- ── Lightbox ── -->
<div id="lightbox" class="lightbox">
    <button class="lb-close" onclick="closeLightbox(event)" aria-label="Close">✕</button>
    <button class="lb-nav lb-prev" onclick="navigate(-1, event)" aria-label="Previous">‹</button>
    <div class="lb-stage" onclick="closeLightbox(event)">
        <img id="lbImg" src="" alt="Full size photo">
    </div>
    <button class="lb-nav lb-next" onclick="navigate(1, event)" aria-label="Next">›</button>
    <div class="lb-counter" id="lbCounter"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const PHOTOS = {{ photos_json | safe }};
    const SLUG   = {{ slug | tojson }};
    let current  = 0;

    const lightbox = document.getElementById("lightbox");
    const lbImg    = document.getElementById("lbImg");
    const lbCount  = document.getElementById("lbCounter");

    function openLightbox(index) {
        current = index;
        lbImg.src = `/photos/${SLUG}/${PHOTOS[current]}`;
        lbCount.textContent = `${current + 1} / ${PHOTOS.length}`;
        lightbox.classList.add("active");
        document.body.style.overflow = "hidden";
    }

    function closeLightbox(e) {
        // Only close if clicking the backdrop/close button, not the image itself
        if (e && e.target === lbImg) return;
        lightbox.classList.remove("active");
        lbImg.src = "";
        document.body.style.overflow = "";
    }

    function navigate(dir, e) {
        e.stopPropagation();
        current = (current + dir + PHOTOS.length) % PHOTOS.length;
        lbImg.src = `/photos/${SLUG}/${PHOTOS[current]}`;
        lbCount.textContent = `${current + 1} / ${PHOTOS.length}`;
    }

    document.addEventListener("keydown", (e) => {
        if (!lightbox.classList.contains("active")) return;
        if (e.key === "Escape")      closeLightbox(e);
        if (e.key === "ArrowRight")  navigate(+1, { stopPropagation: () => {} });
        if (e.key === "ArrowLeft")   navigate(-1, { stopPropagation: () => {} });
    });
</script>
{% endblock %}
